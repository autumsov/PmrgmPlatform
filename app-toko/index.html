<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#ffffff"/>
  <link rel="manifest" href="manifest.json" crossorigin="use-credentials"/>
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png"/>
  <link rel="apple-touch-icon" href="icons/icon-192x192.png"/>
  <title>Toko Barang — Katalog Produk</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
          colors: {
            primary: {
              50: '#eff6ff',
              100: '#dbeafe',
              500: '#3b82f6',
              600: '#2563eb',
              700: '#1d4ed8',
            },
            accent: '#f59e0b'
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #f8fafc; color: #1e293b; }
    .card { background: #ffffff; border-radius: 12px; box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06); }
    .transition-custom { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
    @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-slide-in { animation: slideIn 0.4s ease-out forwards; }
    .row-animate { opacity: 0; }
    
    /* Custom Scrollbar for white theme */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body class="min-h-screen font-sans">

  <!-- Top Navbar -->
  <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200">
    <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <div class="w-9 h-9 rounded-lg bg-primary-600 flex items-center justify-center text-white shadow-md shadow-primary-500/20">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>
          </svg>
        </div>
        <span class="text-lg font-bold text-slate-800 tracking-tight">TokoBarang</span>
      </div>
      <div class="flex items-center gap-3">
        <div class="hidden sm:flex items-center gap-1 bg-emerald-50 text-emerald-600 px-3 py-1 rounded-full text-xs font-semibold border border-emerald-100">
          <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
          Server Online
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-4 py-8">
    
    <!-- Hero Stats -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
      <div class="card p-6 border border-slate-100 animate-slide-in">
        <div class="flex items-center gap-4">
          <div class="w-12 h-12 rounded-full bg-blue-50 flex items-center justify-center text-blue-600">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
          </div>
          <div>
            <p class="text-sm font-medium text-slate-500">Total Kategori Produk</p>
            <p id="stat-total" class="text-2xl font-bold text-slate-800 tracking-tight">—</p>
          </div>
        </div>
      </div>
      <div class="card p-6 border border-slate-100 animate-slide-in" style="animation-delay: 0.1s">
        <div class="flex items-center gap-4">
          <div class="w-12 h-12 rounded-full bg-amber-50 flex items-center justify-center text-amber-600">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          </div>
          <div>
            <p class="text-sm font-medium text-slate-500">Estimasi Rata-rata Harga</p>
            <p id="stat-avg" class="text-2xl font-bold text-slate-800 tracking-tight">—</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Action Bar -->
    <div class="flex flex-col sm:flex-row items-center gap-4 mb-6 animate-slide-in" style="animation-delay: 0.2s">
      <div class="relative w-full sm:flex-1">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
          <svg class="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        </div>
        <input id="search-input" type="text" placeholder="Temukan produk di sini..." 
          class="block w-full bg-white border border-slate-200 rounded-xl py-2.5 pl-10 pr-3 leading-5 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary-500/20 focus:border-primary-500 transition-custom text-sm">
      </div>
      <button id="btn-refresh" class="w-full sm:w-auto inline-flex items-center justify-center px-6 py-2.5 border border-transparent text-sm font-semibold rounded-xl text-white bg-primary-600 hover:bg-primary-700 shadow-lg shadow-primary-500/25 transition-custom active:scale-95">
        <svg class="mr-2 h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
        Muat Ulang
      </button>
    </div>

    <!-- Inventory Table -->
    <div class="card overflow-hidden border border-slate-100 animate-slide-in" style="animation-delay: 0.3s">
      
      <!-- Loading -->
      <div id="loading-state" class="flex flex-col items-center justify-center py-24 gap-4">
        <div class="w-8 h-8 border-4 border-slate-200 border-t-primary-600 rounded-full animate-spin"></div>
        <p class="text-sm font-medium text-slate-500">Sinkronisasi data database...</p>
      </div>

      <!-- Table content -->
      <div id="table-wrapper" class="hidden overflow-x-auto">
        <table class="min-w-full divide-y divide-slate-100">
          <thead class="bg-slate-50">
            <tr>
              <th scope="col" class="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-widest">ID</th>
              <th scope="col" class="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-widest">Informasi Produk</th>
              <th scope="col" class="px-6 py-4 text-right text-xs font-bold text-slate-500 uppercase tracking-widest">Harga Satuan</th>
            </tr>
          </thead>
          <tbody id="tabel-barang" class="bg-white divide-y divide-slate-50">
            <!-- Data rows -->
          </tbody>
        </table>
      </div>

      <!-- Error -->
      <div id="error-state" class="hidden flex-col items-center justify-center py-20 px-4 text-center">
        <div class="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mb-4">
          <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>
        </div>
        <h3 class="text-lg font-bold text-slate-800">Gangguan Koneksi</h3>
        <p id="error-msg" class="text-sm text-slate-500 mt-1 max-w-xs mx-auto"></p>
      </div>

      <!-- Empty -->
      <div id="empty-state" class="hidden flex-col items-center justify-center py-24 text-center">
        <svg class="w-16 h-16 text-slate-200 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0H4"/></svg>
        <p class="text-slate-400 font-medium">Belum ada stok produk terdaftar</p>
      </div>

    </div>

    <!-- Info Footer -->
    <footer class="mt-8 pt-8 border-t border-slate-200 flex flex-col items-center gap-2">
      <p id="footer-info" class="text-xs font-medium text-slate-500"></p>
      <div class="flex items-center gap-4">
        <span class="text-[10px] text-slate-400 uppercase tracking-widest font-bold">Powered by PWA Tech</span>
      </div>
    </footer>

  </main>

  <script src="app.js?v=3"></script>
</body>
</html>
