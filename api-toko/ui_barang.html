<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Barang - Liquid Glass</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            padding: 2rem;
            position: relative;
            overflow: hidden;
            color: #ffffff;
        }

        /* Liquid blobs setup */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.8;
            animation: moveBlobs 20s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }

        .blob-1 {
            width: 500px;
            height: 500px;
            background: rgba(255, 0, 128, 0.6);
            top: -150px;
            left: -150px;
            animation-delay: 0s;
        }

        .blob-2 {
            width: 600px;
            height: 600px;
            background: rgba(0, 240, 255, 0.6);
            bottom: -200px;
            right: -100px;
            animation-delay: -5s;
        }
        
        .blob-3 {
            width: 400px;
            height: 400px;
            background: rgba(112, 0, 255, 0.6);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -10s;
        }

        @keyframes moveBlobs {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            33% { transform: translate(100px, -50px) scale(1.2) rotate(45deg); }
            66% { transform: translate(-50px, 100px) scale(0.8) rotate(-45deg); }
            100% { transform: translate(0, 0) scale(1) rotate(0deg); }
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism Container */
        .glass-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 1100px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 3.5rem;
            box-shadow: 
                0 25px 45px rgba(0, 0, 0, 0.2),
                inset 0 0 20px rgba(255, 255, 255, 0.05);
            transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .glass-container:hover {
            transform: translateY(-5px);
            box-shadow: 
                0 35px 65px rgba(0, 0, 0, 0.3),
                inset 0 0 30px rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #a3a3a3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 20px rgba(0,0,0,0.2);
            letter-spacing: -1px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }

        /* Liquid Glass Cards */
        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2.5rem 2rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.15) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg);
            transition: 0.6s all ease-in-out;
            z-index: 1;
        }

        .card:hover::before {
            left: 150%;
        }

        .card:hover {
            transform: translateY(-15px) scale(1.03);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 
                0 20px 40px rgba(0,0,0,0.3), 
                0 0 30px rgba(255,255,255,0.1) inset,
                0 0 20px rgba(0, 240, 255, 0.2);
        }

        .card-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, rgba(255,0,127,0.8), rgba(0,240,255,0.8));
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            box-shadow: 0 15px 25px rgba(0,0,0,0.2);
            position: relative;
            z-index: 2;
        }

        .card h2 {
            font-size: 1.5rem;
            font-weight: 600;
            line-height: 1.3;
            position: relative;
            z-index: 2;
        }

        .price {
            font-size: 2rem;
            font-weight: 700;
            color: #00f0ff;
            text-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
            position: relative;
            z-index: 2;
        }

        .stock {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: 400;
            border: 1px solid rgba(255, 255, 255, 0.1);
            align-self: flex-start;
            backdrop-filter: blur(10px);
            position: relative;
            z-index: 2;
        }

        .loading {
            grid-column: 1 / -1;
            text-align: center;
            font-size: 1.2rem;
            padding: 3rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top-color: #00f0ff;
            border-right-color: #ff007f;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Decorative accents */
        .glass-container::after {
            content: '';
            position: absolute;
            top: 30px;
            right: 40px;
            width: 60px;
            height: 10px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
        }
        .glass-container::before {
            content: '';
            position: absolute;
            top: 50px;
            right: 40px;
            width: 30px;
            height: 10px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .glass-container {
                padding: 2rem;
            }
            h1 {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>
    <!-- Abstract Liquid Background -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="glass-container">
        <h1>✨ Tech Store UI</h1>
        
        <div id="app" class="grid">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Mengambil data JSON dari get_barang.php...</p>
            </div>
        </div>
    </div>

    <script>
        const app = document.getElementById('app');

        // Fungsi format Rupiah
        const formatRupiah = (number) => {
            return new Intl.NumberFormat('id-ID', {
                style: 'currency',
                currency: 'IDR',
                minimumFractionDigits: 0
            }).format(number);
        };

        // Mengambil data secara asynchronous dari API Endpoint get_barang.php yang kita buat tadi
        fetch('get_barang.php')
            .then(response => {
                if (!response.ok) {
                    throw new Error('Gagal memuat data API');
                }
                return response.json();
            })
            .then(res => {
                // Hapus efek loading
                app.innerHTML = '';
                
                // Cek status API sukses dan datanya ada
                if(res.status === 'success' && res.data.length > 0) {
                    res.data.forEach((item, index) => {
                        // Menentukan icon sederhana berdasarkan nama
                        const nameLower = item.nama_barang.toLowerCase();
                        let icon = '📦';
                        if(nameLower.includes('laptop')) icon = '💻';
                        else if(nameLower.includes('mouse')) icon = '🖱️';
                        else if(nameLower.includes('keyboard')) icon = '⌨️';
                        else if(nameLower.includes('monitor')) icon = '🖥️';

                        // Membuat elemen card baru
                        const card = document.createElement('div');
                        card.className = 'card';
                        
                        // Efek muncul bergantian
                        card.style.opacity = '0';
                        card.style.transform = 'translateY(20px)';
                        card.style.animation = `fadeInUp 0.6s ease forwards ${index * 0.15}s`;
                        
                        card.innerHTML = `
                            <div class="card-icon">${icon}</div>
                            <h2>${item.nama_barang}</h2>
                            <div class="price">${formatRupiah(item.harga)}</div>
                        `;
                        app.appendChild(card);
                    });

                    // CSS animasi keyframes untuk cards
                    const style = document.createElement('style');
                    style.innerHTML = `
                        @keyframes fadeInUp {
                            to { opacity: 1; transform: translateY(0); }
                        }
                    `;
                    document.head.appendChild(style);
                    
                } else {
                    app.innerHTML = `<div style="text-align:center; color:#ff4757; width:100%; grid-column:1/-1;">Data produk tidak tersedia atau kosong.</div>`;
                }
            })
            .catch(error => {
                app.innerHTML = `<div style="text-align:center; color:#ff4757; width:100%; grid-column:1/-1;">Terjadi kesalahan: ${error.message}</div>`;
            });
    </script>
</body>
</html>
